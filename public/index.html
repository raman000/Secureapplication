<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Application - Document Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🔒 Secure Application</h1>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="#" id="navHome">Home</a></li>
                <li><a href="#" id="navDocs">Documents</a></li>
                <li><a href="#" id="navLogout">Logout</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Login/Register Form -->
            <div id="authSection" class="auth-section">
                <div class="auth-container">
                    <h2>Welcome to Secure Application</h2>
                    
                    <!-- Login Form -->
                    <form id="loginForm" class="auth-form active">
                        <h3>Login</h3>
                        <div class="form-group">
                            <label for="loginEmail">Email:</label>
                            <input type="email" id="loginEmail" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password:</label>
                            <input type="password" id="loginPassword" required placeholder="Enter password">
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                        <p class="auth-toggle">Don't have an account? <a href="#" onclick="toggleForms()">Register</a></p>
                    </form>

                    <!-- Register Form -->
                    <form id="registerForm" class="auth-form">
                        <h3>Create Account</h3>
                        <div class="form-group">
                            <label for="registerName">Full Name:</label>
                            <input type="text" id="registerName" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email:</label>
                            <input type="email" id="registerEmail" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password:</label>
                            <input type="password" id="registerPassword" required placeholder="Min 8 characters">
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                        <p class="auth-toggle">Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
                    </form>
                </div>
            </div>

            <!-- Dashboard -->
            <div id="dashboardSection" class="dashboard-section" style="display: none;">
                <div class="dashboard-header">
                    <h2>Welcome, <span id="userName">User</span>!</h2>
                    <p>Manage your secure documents</p>
                </div>

                <!-- Upload Section -->
                <div class="upload-section">
                    <h3>Upload Document</h3>
                    <form id="uploadForm" class="upload-form">
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" required>
                            <label for="fileInput" class="file-label">Choose File</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </form>
                </div>

                <!-- Documents List -->
                <div class="documents-section">
                    <h3>Your Documents</h3>
                    <div id="documentsList" class="documents-list">
                        <p class="empty-state">No documents yet. Upload one to get started.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Alert Messages -->
        <div id="alertBox" class="alert-box"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
